name: Claude Warmup
on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:
jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Random delay 1-10 min
        run: |
          DELAY=$(( (RANDOM % 10 + 1) * 60 ))
          echo "Sleeping $((DELAY/60)) minutes"
          sleep $DELAY
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Ping all accounts
        env:
          CLAUDE_TOKENS: ${{ secrets.CLAUDE_TOKENS }}
        run: |
          for account in $(echo "$CLAUDE_TOKENS" | jq -r 'keys[]'); do
            TOKEN=$(echo "$CLAUDE_TOKENS" | jq -r --arg acc "$account" '.[$acc]')
            echo "=== Pinging account: $account ==="
            CLAUDE_CODE_OAUTH_TOKEN="$TOKEN" claude -p "ok" --model haiku </dev/null || echo "$account failed, continuing..."
          done
